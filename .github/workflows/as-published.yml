# As-published archive ingest (ADR-010, sailscoring#283).
#
# On every push to main, regenerate the ingest documents from the captures
# and push them — with the identity manifest — to the production workspace.
# Ingest is idempotent (unchanged documents no-op by content hash) and the
# identity apply is manifest-pinned, so this runs on every push without
# churn.
#
# Secrets:
#   APP_REPO_TOKEN              read access to sailscoring/sailscoring
#   SAILSCORING_ARCHIVIST_TOKEN the iodai workspace's archivist API key
#                               (workspace- and capability-scoped: it can
#                               only write as-published series/identities)
#
# NOTE: not armed until the prod migration is approved — the push step is
# gated on the secret being configured.
name: as-published

on:
  push:
    branches: [main]
    paths:
      - 'sources/**'
      - 'events/**'
      - 'manifest.json'
      - 'adopted-series-ids.json'
      - 'published-slugs.json'
      - 'as-published.config.json'
      - 'emit_as_published_config.py'
      - 'ranking.py'
      - 'ranking_identities.py'
      - '.github/workflows/as-published.yml'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      SAILSCORING_TOKEN: ${{ secrets.SAILSCORING_ARCHIVIST_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: sailscoring/sailscoring
          token: ${{ secrets.APP_REPO_TOKEN }}
          path: app

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: app/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install app dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Emit the config from the event definitions
        run: python3 emit_as_published_config.py

      - name: Generate ingest documents
        working-directory: app
        run: pnpm archive-generate ${{ github.workspace }}/as-published.config.json

      - name: Emit season-ranking ingest documents
        run: python3 ranking.py emit-ingest

      # The `secrets` context isn't available in `if:` expressions, so the
      # arming gate tests the secret through the job env instead: unset
      # secret -> empty env var -> step skipped.
      - name: Push to the workspace
        if: env.SAILSCORING_TOKEN != ''
        working-directory: app
        run: pnpm cli as-published push ${{ github.workspace }}/as-published --workspace iodai
